name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  # Required so the action can post/update the visual preview comment
  # on PRs. Read-only tokens silently skip the comment step.
  pull-requests: write

jobs:
  # Dogfood the action: render every .svgs file in examples/ using the
  # action's own source, upload the rendered SVGs as an artifact, and on
  # pull requests post a visual preview comment so reviewers can diff
  # the output without downloading anything.
  render-examples:
    name: Render examples
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Render default variants (and post PR preview)
        id: default
        uses: ./
        with:
          input: examples/**/*.svgs
          output-dir: rendered/default
          comment-on-pr: 'true'
          github-token: ${{ github.token }}

      - name: Render retheme variants (template variable override)
        id: themed
        uses: ./
        with:
          input: examples/**/*.svgs
          output-dir: rendered/retheme
          variables: |
            accent=#e74c3c
            title=Q1 Revenue
            barColorStart=#2ecc71
            barColorEnd=#0d6631
            clientColor=#8b5cf6
            apiColor=#ec4899
            dataColor=#f59e0b

      - name: Summary
        run: |
          echo "## Rendered Examples" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Default variants: **${{ steps.default.outputs.count }}** file(s)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Retheme variants: **${{ steps.themed.outputs.count }}** file(s)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the \`rendered-examples\` artifact to preview each SVG." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload rendered examples
        uses: actions/upload-artifact@v5
        with:
          name: rendered-examples
          path: rendered/
          retention-days: 30
