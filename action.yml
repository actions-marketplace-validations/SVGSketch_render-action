name: 'SVGSketch Render'
description: 'Render SVGSketch .svgs documents to SVG in CI/CD. Supports globs, template variables, and batch rendering.'
author: 'SVGSketch'
branding:
  icon: 'image'
  color: 'blue'

inputs:
  input:
    description: >-
      File path or glob pattern for `.svgs` files to render.
      Glob patterns follow @actions/glob syntax (e.g. `designs/**/*.svgs`).
    required: false
    default: '**/*.svgs'
  output-dir:
    description: >-
      Directory to write rendered SVG files into. Source directory structure is
      mirrored beneath this path. When omitted, rendered files are written
      next to their source `.svgs` files.
    required: false
    default: ''
  variables:
    description: >-
      Template variable overrides. Accepts either a JSON object
      (`{"color":"#f00","size":"40"}`) or newline-separated `KEY=VALUE` pairs.
      Variables not overridden fall back to the document's declared defaults.
    required: false
    default: ''
  width:
    description: 'Override canvas width (pixels). Optional.'
    required: false
    default: ''
  height:
    description: 'Override canvas height (pixels). Optional.'
    required: false
    default: ''
  background:
    description: 'Background color (e.g. `#ffffff`). Adds a background `<rect>` to rendered SVGs.'
    required: false
    default: ''
  fail-on-warnings:
    description: 'Treat validation warnings as failures. Default `false` (warnings only logged).'
    required: false
    default: 'false'
  comment-on-pr:
    description: >-
      Post the rendered outputs as a visual preview comment on the pull
      request. Requires `permissions: pull-requests: write` in the
      consumer workflow. Default `false`.
    required: false
    default: 'false'
  comment-format:
    description: >-
      How renders are embedded in the PR comment. `png` rasterizes each
      SVG to a base64 PNG embedded inline (works for small/medium images).
      `artifact-link` skips rasterization and posts a link to the uploaded
      artifact instead. Default `png`.
    required: false
    default: 'png'
  comment-max-kb:
    description: >-
      Maximum size (KB) of a single rendered PNG before the action falls
      back to artifact-link mode for that file, to avoid bloating the PR
      comment beyond GitHub's rendering limits. Default `400`.
    required: false
    default: '400'
  github-token:
    description: >-
      Token used to post/update the PR comment. Defaults to the workflow's
      automatic `${{ github.token }}`, which is sufficient for most
      usage. Override only if you need a different identity (e.g. a bot
      account) to author the comment.
    required: false
    default: ${{ github.token }}

outputs:
  files:
    description: 'JSON array of rendered output file paths (relative to the runner workspace).'
  count:
    description: 'Number of `.svgs` files rendered.'

runs:
  using: 'node24'
  main: 'dist/index.js'
